<!-- @purpose  日本語話者向け韓国語単語・例文学習ページ（バックエンドなし、静的サイト）。クイズカードですぐ開始、単語帳モードに切り替え可能 -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>韓国語単語帳 | TOPIK 1級〜6級</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>韓国語単語帳</h1>
    <p class="subtitle">TOPIK 1級〜6級の単語と例文で勉強しよう</p>
  </header>

  <nav class="level-tabs" aria-label="TOPIK級選択">
    <button class="level-tab is-active" data-level="ALL" aria-pressed="true">すべて</button>
    <button class="level-tab" data-level="1" aria-pressed="false">1級</button>
    <button class="level-tab" data-level="2" aria-pressed="false">2級</button>
    <button class="level-tab" data-level="3" aria-pressed="false">3級</button>
    <button class="level-tab" data-level="4" aria-pressed="false">4級</button>
    <button class="level-tab" data-level="5" aria-pressed="false">5級</button>
    <button class="level-tab" data-level="6" aria-pressed="false">6級</button>
  </nav>

  <div class="toolbar">
    <input
      type="search"
      id="search-input"
      class="search-input"
      placeholder="単語・発音・意味で検索"
      aria-label="単語検索"
    />
    <div class="toolbar-buttons">
      <button id="mode-toggle" class="toolbar-btn" aria-pressed="false">📚 単語帳表示</button>
      <button id="shuffle-btn" class="toolbar-btn" aria-label="単語の順番をシャッフル">🔀 シャッフル</button>
    </div>
  </div>

  <main id="main-content">
    <div id="tts-warning" class="tts-warning" hidden role="alert">
      このブラウザは音声再生（TTS）に対応していません。カタカナ発音表記で学習してください。
    </div>

    <section id="list-view" class="word-grid" aria-label="単語一覧" hidden></section>

    <section id="card-view" class="card-view" aria-label="カード学習モード">
      <div class="card-nav">
        <button id="card-prev" class="toolbar-btn" aria-label="前の単語">← 前へ</button>
        <span id="card-position" class="card-position">0 / 0</span>
        <button id="card-next" class="toolbar-btn" aria-label="次の単語へ（スキップ）">次へ / スキップ →</button>
      </div>
      <div id="card-slot"></div>
    </section>

    <p id="empty-state" class="empty-state" hidden>検索結果に該当する単語がありません。</p>
  </main>

  <template id="word-card-template">
    <article class="word-card">
      <div class="word-card-top">
        <span class="level-badge"></span>
        <div class="word-main">
          <span class="hangul"></span>
          <span class="reading"></span>
        </div>
        <div class="word-actions">
          <button class="katakana-toggle-btn" type="button">🇯🇵 カタカナ</button>
          <button class="tts-btn" type="button">🔊 再生</button>
        </div>
      </div>
      <p class="katakana-reading" hidden></p>
      <p class="meaning"></p>

      <div class="example-block">
        <div class="example-top">
          <p class="example-ko"></p>
          <div class="word-actions">
            <button class="katakana-toggle-btn example-katakana-toggle" type="button">🇯🇵 カタカナ</button>
            <button class="tts-btn example-tts" type="button">🔊 再生</button>
          </div>
        </div>
        <p class="example-katakana" hidden></p>
        <p class="example-meaning"></p>
        <ul class="breakdown-list" hidden></ul>
      </div>
    </article>
  </template>

  <template id="quiz-card-template">
    <article class="quiz-card">
      <span class="level-badge"></span>

      <div class="quiz-question">
        <p class="hangul-line">
          <span class="hangul"></span><span class="hangul-reading"></span>
        </p>
        <p class="example-ko"></p>
        <p class="example-reading"></p>
      </div>

      <div class="quiz-controls">
        <button class="tts-word-btn" type="button">🔊 単語の発音</button>
        <button class="tts-example-btn" type="button">🔊 例文の発音</button>
        <button class="reveal-btn" type="button" aria-pressed="false">答えを確認</button>
      </div>

      <div class="quiz-answer" hidden>
        <p class="katakana-reading"></p>
        <p class="meaning"></p>
        <div class="example-answer">
          <p class="example-katakana"></p>
          <p class="example-meaning"></p>
          <ul class="breakdown-list" hidden></ul>
        </div>
      </div>
    </article>
  </template>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
